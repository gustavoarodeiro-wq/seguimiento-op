<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Seguimiento OP</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-header">
      <div class="login-icon">⚙</div>
      <h1>Seguimiento OP</h1>
      <p>Órdenes de Producción</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="login-form" id="loginForm">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="usuario@empresa.com"
          required
          autocomplete="email"
        >
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-password">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          >
          <button type="button" class="toggle-pwd" onclick="togglePassword()" title="Mostrar/ocultar">
            <span id="eyeIcon">👁</span>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
        Ingresar
      </button>
    </form>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('loginForm').addEventListener('submit', function () {
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Ingresando…';
    });
  </script>
</body>
</html>
