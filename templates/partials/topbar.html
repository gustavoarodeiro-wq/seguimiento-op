<header class="topbar">
  <div class="topbar-brand">
    <span class="topbar-logo">⚗</span>
    <div class="topbar-brand-text">
      <span class="topbar-title">Sistema de Gestión para Laboratorios Farmacéuticos <span class="topbar-version">v1.2</span></span>
      {% set _lab = get_lab_nombre() %}{% if _lab %}<span class="topbar-lab">{{ _lab }}</span>{% endif %}
    </div>
  </div>
  <div class="topbar-user">
    <span class="user-name">{{ user.nombre }}</span>
    <span class="user-rol badge badge-{{ user.rol }}">{{ user.rol }}</span>
    <a href="/logout">Cerrar sesión</a>
  </div>
</header>
